<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bulut Tabanlı İş Listem</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f1f5f9; color: #334155; min-height: 100vh; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: 280px 1fr 320px; gap: 20px; max-width: 1600px; margin: 0 auto; align-items: start; }
        .card { background-color: #ffffff; padding: 20px; border-radius: 14px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04); margin-bottom: 15px; }
        h2 { font-size: 17px; color: #1e293b; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .stat-sidebar { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); border-left: 6px solid #64748b; display: flex; flex-direction: column; gap: 4px; }
        .stat-card.total { border-left-color: #2563eb; }
        .stat-card.high { border-left-color: #ef4444; }
        .stat-card.done { border-left-color: #10b981; }
        .stat-title { font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; }
        .stat-value { font-size: 24px; font-weight: 700; color: #1e293b; }
        .main-panel { min-width: 0; }
        .input-section { display: flex; gap: 8px; margin-bottom: 15px; }
        input[type="text"], select { padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; outline: none; }
        input[type="text"] { flex: 2; min-width: 0; }
        select { flex: 1; background-color: #fff; cursor: pointer; }
        .btn-add { background-color: #2563eb; color: white; border: none; padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .search-input { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; background-color: #f8fafc; margin-bottom: 15px; outline: none; }
        .tab-menu { display: flex; border-bottom: 2px solid #e2e8f0; margin-bottom: 15px; }
        .tab-btn { flex: 1; background: none; border: none; padding: 10px; font-size: 13px; font-weight: 600; color: #64748b; cursor: pointer; }
        .tab-btn.active { color: #2563eb; border-bottom: 3px solid #2563eb; margin-bottom: -2px; }
        .task-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .task-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-radius: 8px; border-left: 5px solid #cbd5e1; box-shadow: 0 2px 5px rgba(0,0,0,0.01); cursor: pointer; gap: 10px; }
        .task-item.selected-task { box-shadow: 0 4px 10px rgba(37, 99, 235, 0.15); outline: 2px solid #2563eb; }
        .task-item.priority-yuksek { background-color: #fff5f5; border-left-color: #ef4444; }
        .task-item.priority-orta { background-color: #fffbeb; border-left-color: #f59e0b; }
        .task-item.priority-dusuk { background-color: #f0fdf4; border-left-color: #10b981; }
        .task-item.completed { background-color: #f8fafc !important; border-left-color: #cbd5e1 !important; }
        .task-item.deleted-status { background-color: #f1f5f9 !important; border-left-color: #64748b !important; opacity: 0.8; }
        .task-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
        .task-checkbox { width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; }
        .task-text-container { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
        .task-text { font-size: 14px; font-weight: 500; color: #334155; word-break: break-word; }
        .task-item.completed .task-text { text-decoration: line-through; color: #94a3b8; }
        .task-meta { font-size: 11px; color: #64748b; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .badge { padding: 1px 4px; border-radius: 4px; font-size: 9px; font-weight: 600; text-transform: uppercase; }
        .badge-yuksek { background-color: #fee2e2; color: #ef4444; }
        .badge-orta { background-color: #fef3c7; color: #d97706; }
        .badge-dusuk { background-color: #d1fae5; color: #059669; }
        .action-btns { display: flex; gap: 6px; flex-shrink: 0; }
        .btn-delete { background-color: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
        .btn-restore { background-color: #0ea5e9; color: white; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
        .countdown-timer { color: #dc2626; font-weight: 600; background-color: #fee2e2; padding: 1px 4px; border-radius: 4px; }
        .empty-message { text-align: center; color: #94a3b8; font-size: 13px; padding: 15px; }
        .notepad-textarea { width: 100%; height: 350px; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; line-height: 1.5; resize: none; outline: none; background-color: #fffdeb; color: #334155; transition: background-color 0.3s; }
        .notepad-textarea.task-mode { background-color: #e0f2fe; }
        .notepad-textarea:focus { border-color: #2563eb; }
        .notepad-info { font-size: 11px; color: #94a3b8; text-align: right; margin-top: 5px; }
        .btn-clear-select { font-size: 11px; background: #64748b; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        
        /* 📱 MOBİL (IPHONE) DÜZENLEMELERİ */
        @media (max-width: 900px) {
            body { padding: 10px; background-color: #f8fafc; }
            .dashboard { grid-template-columns: 1fr; gap: 10px; }
            .stat-sidebar { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .stat-sidebar .card:first-child { display: none; }
            .stat-card { padding: 10px; border-left-width: 4px; align-items: center; text-align: center; }
            .stat-title { font-size: 9px; }
            .stat-value { font-size: 18px; }
            .input-section { flex-direction: column; gap: 8px; }
            input[type="text"], select, .btn-add { width: 100%; padding: 12px; font-size: 15px; }
            .notepad-textarea { height: 200px; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="stat-sidebar">
        <div class="card" style="padding: 15px; text-align: center; font-weight: bold; font-size: 15px; background: #1e293b; color: white;">📊 Proje Durum Özeti</div>
        <div class="stat-card total"><span class="stat-title">Devam Eden</span><span class="stat-value" id="stat-total-val">0</span></div>
        <div class="stat-card high"><span class="stat-title">Yüksek</span><span class="stat-value" id="stat-high-val">0</span></div>
        <div class="stat-card done"><span class="stat-title">Tamamlanan</span><span class="stat-value" id="stat-done-val">0</span></div>
    </div>

    <div class="card main-panel">
        <h2>📋 İş Listem & Panel</h2>
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Yeni bir görev yazın...">
            <select id="prioritySelect">
                <option value="3">🚨 Yüksek</option>
                <option value="2" selected>⏳ Orta</option>
                <option value="1">☕ Düşük</option>
            </select>
            <button class="btn-add" onclick="addTask()">Ekle</button>
        </div>
        <input type="text" id="searchInput" class="search-input" placeholder="Görevlerde aratın..." oninput="renderTasks()">
        <div class="tab-menu">
            <button class="tab-btn active" id="tab-active" onclick="switchTab('active')">Devam Eden</button>
            <button class="tab-btn" id="tab-completed" onclick="switchTab('completed')">Bitenler</button>
            <button class="tab-btn" id="tab-deleted" onclick="switchTab('deleted')">Çöp</button>
        </div>
        <ul id="taskList" class="task-list"></ul>
    </div>

    <div class="card">
        <h2><span id="notepad-title">📝 Karalama Notları</span><button id="clearSelectBtn" class="btn-clear-select" style="display: none;" onclick="deselectTask()">Genel</button></h2>
        <textarea id="notepad" class="notepad-textarea" placeholder="Yükleniyor..." oninput="handleNoteInput()"></textarea>
        <div class="notepad-info">Bulut anlık eşitlenir</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // BURAYA KENDİ FIREBASE ŞİFRELERİNİ KOYACAKSIN:
    const firebaseConfig = {
  apiKey: "AIzaSyB3uRFdgCSorihfyn7qJhZcersjpmxGA-g",
  authDomain: "is-takip-cbbd2.firebaseapp.com",
  projectId: "is-takip-cbbd2",
  storageBucket: "is-takip-cbbd2.firebasestorage.app",
  messagingSenderId: "695369463741",
  appId: "1:695369463741:web:f25c6935753234a3eac4d4",
  measurementId: "G-P1C835G233"
};
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let dbData = { tasks: [], generalNotes: "" };
    let currentTab = 'active';
    let selectedTaskId = null;

    // ESKİ VERİLERİ KURTARMA KÖPRÜSÜ
    function migrateOldLocalTasks() {
        try {
            const oldLocalTasks = JSON.parse(localStorage.getItem('tasks'));
            const oldLocalNotes = localStorage.getItem('notepad_notes');
            let updated = false;

            if (oldLocalTasks && oldLocalTasks.length > 0 && dbData.tasks.length === 0) {
                dbData.tasks = oldLocalTasks;
                updated = true;
            }
            if (oldLocalNotes && !dbData.generalNotes) {
                dbData.generalNotes = oldLocalNotes;
                updated = true;
            }
            if (updated) {
                pushToCloud();
                localStorage.removeItem('tasks');
                localStorage.removeItem('notepad_notes');
            }
        } catch(e) { console.log("Veri göçü hatası:", e); }
    }

    onSnapshot(doc(db, "is-takip-data", "global"), (docSnap) => {
        if (docSnap.exists()) {
            dbData = docSnap.data();
            if (!dbData.tasks) dbData.tasks = [];
        } else {
            migrateOldLocalTasks();
        }
        
        migrateOldLocalTasks();
        updateStats();
        renderTasks();
        
        const notepad = document.getElementById('notepad');
        if (!selectedTaskId) {
            notepad.value = dbData.generalNotes || "";
            notepad.placeholder = "Genel notlarınızı buraya yazın...";
        } else {
            const task = dbData.tasks.find(t => t.id === selectedTaskId);
            if (task) notepad.value = task.note || "";
        }
    });

    async function pushToCloud() {
        await setDoc(doc(db, "is-takip-data", "global"), dbData);
    }

    window.handleNoteInput = function() {
        const text = document.getElementById('notepad').value;
        if (selectedTaskId) {
            dbData.tasks = dbData.tasks.map(t => {
                if (t.id === selectedTaskId) t.note = text;
                return t;
            });
        } else {
            dbData.generalNotes = text;
        }
        pushToCloud();
    }

    window.selectTask = function(id) {
        if (currentTab === 'deleted') return;
        selectedTaskId = id;
        const task = dbData.tasks.find(t => t.id === id);
        if (!task) return;

        document.getElementById('notepad-title').innerHTML = `📌 Notlar`;
        document.getElementById('clearSelectBtn').style.display = 'inline-block';
        const notepad = document.getElementById('notepad');
        notepad.classList.add('task-mode');
        notepad.value = task.note || "";
        renderTasks();
    }

    window.deselectTask = function() {
        selectedTaskId = null;
        document.getElementById('notepad-title').innerText = `📝 Karalama Notları`;
        document.getElementById('clearSelectBtn').style.display = 'none';
        const notepad = document.getElementById('notepad');
        notepad.classList.remove('task-mode');
        notepad.value = dbData.generalNotes || "";
        renderTasks();
    }

    window.addTask = function() {
        const taskInput = document.getElementById('taskInput');
        const prioritySelect = document.getElementById('prioritySelect');
        if (taskInput.value.trim() === '') return;

        const now = new Date();
        const timeString = now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
        const dateString = now.toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit' });

        const newTask = {
            id: Date.now(),
            text: taskInput.value.trim(),
            priority: parseInt(prioritySelect.value),
            completed: false,
            isDeleted: false,
            deletedAt: null,
            timestamp: `${dateString} - ${timeString}`,
            note: ""
        };

        dbData.tasks.push(newTask);
        pushToCloud();
        taskInput.value = '';
    }

    window.toggleTask = function(id, event) {
        event.stopPropagation();
        dbData.tasks = dbData.tasks.map(t => {
            if (t.id === id) t.completed = !t.completed;
            return t;
        });
        pushToCloud();
    }

    window.moveToTrash = function(id, event) {
        event.stopPropagation();
        if (selectedTaskId === id) deselectTask();
        dbData.tasks = dbData.tasks.map(t => {
            if (t.id === id) { t.isDeleted = true; t.deletedAt = Date.now(); }
            return t;
        });
        pushToCloud();
    }

    window.restoreTask = function(id, event) {
        event.stopPropagation();
        dbData.tasks = dbData.tasks.map(t => {
            if (t.id === id) { t.isDeleted = false; t.deletedAt = null; }
            return t;
        });
        pushToCloud();
    }

    window.switchTab = function(tab) {
        currentTab = tab;
        document.getElementById('tab-active').classList.toggle('active', tab === 'active');
        document.getElementById('tab-completed').classList.toggle('active', tab === 'completed');
        document.getElementById('tab-deleted').classList.toggle('active', tab === 'deleted');
        renderTasks();
    }

    function updateStats() {
        const activeCount = dbData.tasks.filter(t => !t.completed && !t.isDeleted).length;
        const highCount = dbData.tasks.filter(t => !t.completed && !t.isDeleted && t.priority === 3).length;
        const completedCount = dbData.tasks.filter(t => t.completed && !t.isDeleted).length;

        document.getElementById('stat-total-val').innerText = activeCount;
        document.getElementById('stat-high-val').innerText = highCount;
        document.getElementById('stat-done-val').innerText = completedCount;
    }

    setInterval(function() {
        let changed = false;
        const now = Date.now();
        dbData.tasks = dbData.tasks.filter(t => {
            if (t.deletedAt && (now - t.deletedAt >= 300000)) {
                if (selectedTaskId === t.id) deselectTask();
                changed = true;
                return false;
            }
            return true;
        });
        if (changed) pushToCloud();
        renderTasks();
    }, 1000);

    window.renderTasks = function() {
        const taskList = document.getElementById('taskList');
        const searchInput = document.getElementById('searchInput').value.toLowerCase();
        taskList.innerHTML = '';
        const now = Date.now();

        let filtered = [...dbData.tasks].sort((a, b) => b.priority - a.priority);

        filtered = filtered.filter(t => {
            if (currentTab === 'deleted') return t.isDeleted;
            if (currentTab === 'active') return !t.completed && !t.isDeleted;
            if (currentTab === 'completed') return t.completed && !t.isDeleted;
        });

        filtered = filtered.filter(t => t.text.toLowerCase().includes(searchInput));

        if (filtered.length === 0) {
            taskList.innerHTML = `<li class="empty-message">Görev bulunamadı.</li>`;
            return;
        }

        filtered.forEach(task => {
            const li = document.createElement('li');
            let pLabel = task.priority === 3 ? 'Yüksek' : task.priority === 2 ? 'Orta' : 'Düşük';
            let pClass = task.priority === 3 ? 'yuksek' : task.priority === 2 ? 'orta' : 'dusuk';
            let isSelectedClass = (task.id === selectedTaskId) ? 'selected-task' : '';

            if (currentTab === 'deleted') {
                const msLeft = 300000 - (now - task.deletedAt);
                const min = Math.max(0, Math.floor(msLeft / 60000));
                const sec = Math.max(0, Math.floor((msLeft % 60000) / 1000));

                li.className = `task-item deleted-status`;
                li.innerHTML = `<div class="task-left"><div class="task-text-container"><span class="task-text">${task.text}</span><div class="task-meta"><span class="badge badge-${pClass}">${pLabel}</span><span class="countdown-timer">⏳ ${min}:${sec < 10 ? '0' : ''}${sec}</span></div></div></div><div class="action-btns"><button class="btn-restore" onclick="restoreTask(${task.id}, event)">Geri</button></div>`;
            } else {
                li.className = `task-item priority-${pClass} ${task.completed ? 'completed' : ''} ${isSelectedClass}`;
                li.setAttribute('onclick', `selectTask(${task.id})`);
                li.innerHTML = `<div class="task-left"><input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id}, event)"><div class="task-text-container"><span class="task-text">${task.text}</span><div class="task-meta"><span class="badge badge-${pClass}">${pLabel}</span><span>⏱️ ${task.timestamp}</span>${task.note ? '📝' : ''}</div></div></div><button class="btn-delete" onclick="moveToTrash(${task.id}, event)">Sil</button>`;
            }
            taskList.appendChild(li);
        });
    }

    document.getElementById('taskInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') addTask(); });
</script>
</body>
</html>
